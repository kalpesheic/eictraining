apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  labels:
    helm.sh/chart: catalog-1.2.4
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/instance: {{ .Values.app.name }}
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: retail-store-sample
    app.kubernetes.io/managed-by: Helm

spec:
  replicas: {{ .Values.app.replicas }}

  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app.name }}
      app.kubernetes.io/instance: {{ .Values.app.name }}
      app.kubernetes.io/component: service
      app.kubernetes.io/owner: retail-store-sample

  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"

      labels:
        app.kubernetes.io/name: {{ .Values.app.name }}
        app.kubernetes.io/instance: {{ .Values.app.name }}
        app.kubernetes.io/component: service
        app.kubernetes.io/owner: retail-store-sample

    spec:
      serviceAccountName: {{ .Values.app.serviceAccount }}

      securityContext:
        fsGroup: 1000

      containers:
        - name: catalog

          image: {{ .Values.app.image }}
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: {{ .Values.configMap.name }}
            - secretRef:
                name: {{ .Values.secret.name }}

          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /health
              port: 8080

          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 256m
              memory: 256Mi

          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume

      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory
